<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coeus AI - User + Upload</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: #ea4e59;
      box-shadow: 0 0 0 3px rgba(234, 78, 89, 0.12);
    }
    button {
      width: 100%;
      border: none;
      background: #ea4e59;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #d9444f; }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .hint {
      margin-top: 12px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>User + Upload PDF</h1>
    <p>Enter your name, upload a PDF, and move to the processing page.</p>

    <form id="uploadForm">
      <label for="userName">User Name</label>
      <input id="userName" type="text" placeholder="e.g. Sriom Dash" required />

      <label for="pdfFile">Choose PDF</label>
      <input id="pdfFile" type="file" accept="application/pdf" required />

      <button id="submitBtn" type="submit">Save User and Upload PDF</button>
    </form>

    <div id="result" class="result"></div>
    <div class="hint">Backend expected at http://127.0.0.1:8000/api/v1</div>
  </div>

  <script>
    const API_V1 = "http://127.0.0.1:8000/api/v1";
    const form = document.getElementById("uploadForm");
    const resultBox = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");

    function showResult(message, ok) {
      resultBox.style.display = "block";
      resultBox.className = `result ${ok ? "success" : "error"}`;
      resultBox.textContent = message;
    }

    async function parseError(response) {
      try {
        const data = await response.json();
        if (typeof data?.detail === "string") return data.detail;
        if (Array.isArray(data?.detail)) return JSON.stringify(data.detail, null, 2);
        if (data?.message) return data.message;
        return JSON.stringify(data, null, 2);
      } catch {
        return await response.text();
      }
    }

    async function createUser(userName, userPdfName) {
      const response = await fetch(`${API_V1}/users/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_name: userName,
          user_pdf_name: userPdfName || null
        })
      });

      if (!response.ok) {
        throw new Error(await parseError(response));
      }

      return await response.json();
    }

    async function uploadPdf(file, userId, userName) {
      const formData = new FormData();
      formData.append("file", file);

      const url = new URL(`${API_V1}/ingest/upload`);
      url.searchParams.set("user_id", userId);
      url.searchParams.set("user_name", userName);

      const response = await fetch(url.toString(), {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error(await parseError(response));
      }

      return await response.json();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      resultBox.style.display = "none";

      try {
        const userName = document.getElementById("userName").value.trim();
        const file = document.getElementById("pdfFile").files[0];

        if (!userName) throw new Error("Please enter user name.");
        if (!file) throw new Error("Please select a PDF file.");

        const userData = await createUser(userName, file.name);
        const userId = userData.user.user_id;

        localStorage.setItem("user_id", userId);
        localStorage.setItem("user_name", userName);

        const uploadData = await uploadPdf(file, userId, userName);
        localStorage.setItem("upload_id", uploadData.upload_id);
        localStorage.setItem("filename", uploadData.filename || file.name);

        showResult("User saved and PDF uploaded successfully. Redirecting to processing page...", true);

        setTimeout(() => {
          window.location.href = "process.html";
        }, 1000);

      } catch (error) {
        showResult(`Failed.\n\n${error.message}`, false);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
